  <head>
    {% include head.html %}
    {% include head/custom.html %}
  </head>

  <body>

    {% include browser-upgrade.html %}
    {% include masthead.html %}

    {{ content }}

    <div class="page__footer">
      <footer>
        {% include footer/custom.html %}
        {% include footer.html %}
      </footer>
    </div>

    {% include scripts.html %}

<script>
  // Ouvre automatiquement les liens externes + les fichiers PDF dans un nouvel onglet
  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('a').forEach(link => {
      const href = link.getAttribute('href') || '';

      // Cas 1 : Liens externes (http/https vers un autre site)
      const isExternal = (href.startsWith('http') && !href.includes(window.location.hostname));

      // Cas 2 : Liens vers tes fichiers PDF ou /files/
      const isFile = href.startsWith('/files/') || href.endsWith('.pdf');

      if (isExternal || isFile) {
        link.setAttribute('target', '_blank');
        link.setAttribute('rel', 'noopener noreferrer');
      }
    });
  });
</script>

  </body>
</html>
